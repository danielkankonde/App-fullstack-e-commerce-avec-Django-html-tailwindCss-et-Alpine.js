{% extends "base.html" %}
{% load static %}

{% block title %}Tous les produits | MaBoutique{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold text-gray-800 mb-8 reveal">
    Tous nos produits
</h1>

<div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-4 gap-6">
        {% for prod in produits %}
        <div class="product-card bg-white rounded-lg shadow hover:shadow-lg transition p-4">
            <img src="{{ prod.image.url }}" class="media-zoom h-40 w-full object-contain" alt="{{ prod.nom }}">
            <h3 class="mt-4 font-semibold text-gray-800">{{ prod.nom }}</h3>
            <p class="text-green-500 font-bold mt-2">{{ prod.prix }} $</p>

            <div class="flex items-center gap-1.5 mt-3">
                <button
                    data-id="{{ prod.id }}"
                    onclick="addToCart(this.dataset.id)"
                    class="btn-pro inline-flex min-w-0 flex-1 items-center justify-center px-3 py-3 bg-green-500 text-white text-xs font-medium rounded hover:bg-green-600 transition sm:flex-none sm:px-3">
                    Ajouter au panier
                </button>
                <a href="{% url 'products:detail' prod.id %}" class="btn-pro inline-flex min-w-0 items-center justify-center px-3 py-3 bg-yellow-500 text-white text-xs font-medium rounded hover:bg-yellow-600 transition">Voir</a>
            </div>
        </div>
    {% empty %}
    <p>Aucun produit disponible pour le moment.</p>
    {% endfor %}

</div>

{% endblock %}
